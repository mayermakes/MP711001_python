<!DOCTYPE html>
<html>
<head>
  <title>Stable PSU Control</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .ch { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
    input { width: 80px; }
  </style>
</head>
<body>

<h2>MP711001 PSU Control</h2>

<div id="ui"></div>

<script>
const CH = [1,2,3,4];

document.getElementById("ui").innerHTML = CH.map(c => `
<div class="ch">
  <h3>CH${c}</h3>

  Voltage: <input id="v${c}">
  Current: <input id="i${c}">

  <button onclick="set(${c})">SET</button>
  <button onclick="out(${c},true)">ON</button>
  <button onclick="out(${c},false)">OFF</button>
</div>
`).join("");

async function set(ch){
  await fetch("/set", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      channel:ch,
      voltage:document.getElementById("v"+ch).value,
      current:document.getElementById("i"+ch).value
    })
  });
}

async function out(ch,state){
  await fetch("/output", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({channel:ch,state})
  });
}

async function measure(){
  const r = await fetch("/measure");
  const d = await r.json();

  console.log("CH", d.channel, d.voltage, d.current);
}

setInterval(measure, 2000);
</script>

</body>
</html>
